<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Teste Mobile</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{font-family:sans-serif;background:#0f1117;color:#dde4f0}

/* TELA DE LOGIN — fixed inset:0 */
#loginScreen{
  position:fixed;inset:0;
  background:#050505;
  z-index:9999;
  display:flex;align-items:center;justify-content:center;
}
.login-box{
  background:#1a1a2e;border:1px solid #333;border-radius:12px;
  padding:32px;width:320px;text-align:center;
}
.login-box h2{margin-bottom:16px;color:#C9A84C}
.login-box input{
  width:100%;padding:10px;margin-bottom:12px;
  background:#111;border:1px solid #333;border-radius:8px;
  color:#fff;font-size:14px;
}
.login-box button{
  width:100%;padding:12px;background:#C9A84C;
  border:none;border-radius:8px;font-size:14px;
  font-weight:600;cursor:pointer;color:#050505;
}

/* APP — fixed inset:0 */
#app{
  display:none;
  position:fixed;inset:0;overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:240px;flex-shrink:0;
  background:#0c1018;border-right:1px solid #1a2235;
  display:flex;flex-direction:column;
  height:100%;overflow-y:auto;
}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid #1a2235;font-weight:700;font-size:16px;color:#C9A84C}
.sidebar-item{padding:12px 16px;cursor:pointer;font-size:13px;color:#8896ad;border-radius:8px;margin:2px 8px}
.sidebar-item:hover,.sidebar-item.active{background:#1a2235;color:#C9A84C}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:56px;flex-shrink:0;
  background:#0c1018;border-bottom:1px solid #1a2235;
  display:flex;align-items:center;padding:0 20px;gap:12px;
}
.hamburger{
  display:none;background:none;border:none;
  color:#dde4f0;font-size:20px;cursor:pointer;padding:4px;
}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;-webkit-overflow-scrolling:touch}

/* MOBILE OVERLAY */
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999}
.mobile-overlay.show{display:block}

/* CARD TESTE */
.card{background:#0c1018;border:1px solid #1a2235;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:14px;color:#8896ad;margin-bottom:8px}
.card .val{font-size:24px;font-weight:700;color:#C9A84C}

@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{
    position:fixed;left:-260px;top:0;bottom:0;
    width:240px;z-index:1000;
    transition:left .25s ease;
  }
  .sidebar.open{left:0;box-shadow:8px 0 32px rgba(0,0,0,.6)}
  .main{width:100%}
  .topbar{padding:0 12px}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>ASSENT</h2>
    <p style="font-size:12px;color:#666;margin-bottom:20px">Teste de layout mobile</p>
    <input type="email" placeholder="E-mail">
    <input type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">ASSENT</div>
    <div class="sidebar-item active">Dashboard</div>
    <div class="sidebar-item">Clientes</div>
    <div class="sidebar-item">Vendas</div>
    <div class="sidebar-item">Financeiro</div>
    <div class="sidebar-item">Relatórios</div>
    <div class="sidebar-item">Configurações</div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span style="font-weight:600">Dashboard</span>
    </div>
    <div class="content">
      <div class="card"><h3>RECEITA</h3><div class="val">R$ 12.480,00</div></div>
      <div class="card"><h3>CLIENTES</h3><div class="val">34</div></div>
      <div class="card"><h3>VENDAS</h3><div class="val">18</div></div>
      <div class="card"><h3>LUCRO</h3><div class="val">R$ 5.200,00</div></div>
      <div class="card"><h3>TICKET MÉDIO</h3><div class="val">R$ 693,00</div></div>
      <div class="card"><h3>MARGEM</h3><div class="val">41,7%</div></div>
      <div class="card"><h3>PROJEÇÃO 30d</h3><div class="val">R$ 14.900,00</div></div>
      <div class="card"><h3>ESTOQUE</h3><div class="val">127 un.</div></div>
    </div>
  </div>

  <div class="mobile-overlay" id="overlay" onclick="closeSidebar()"></div>
</div>

<script>
function entrar(){
  document.getElementById('loginScreen').style.display='none'
  document.getElementById('app').style.display='flex'
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open')
  document.getElementById('overlay').classList.toggle('show')
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open')
  document.getElementById('overlay').classList.remove('show')
}
</script>
</body>
</html>
