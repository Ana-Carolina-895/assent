<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSENT Sistema v1.3.1</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0c11;
color:#e6e9ef
}

/* CORREÇÃO PRINCIPAL */
.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:#0f1218;
border-right:1px solid #1c2230;
padding:25px
}

.menu{
display:flex;
flex-direction:column;
gap:8px
}

.menu button{
background:none;
border:none;
color:#a9b1c3;
padding:12px;
text-align:left;
border-radius:8px;
cursor:pointer
}

.menu button:hover{
background:#171c26;
color:#fff
}

.main{
flex:1;
display:flex;
flex-direction:column
}

.topbar{
height:70px;
display:flex;
align-items:center;
padding:0 30px;
border-bottom:1px solid #1c2230
}

.content{
padding:30px;
overflow:auto
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px
}

.card{
background:#111621;
border:1px solid #1e2635;
padding:20px;
border-radius:12px
}

.stat{
font-size:30px;
font-weight:600
}

.form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-bottom:12px
}

input,select{
background:#0d121a;
border:1px solid #222a39;
border-radius:8px;
padding:10px;
color:#e6e9ef
}

button.primary{
background:#3b82f6;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer
}

button.danger{
background:#ef4444;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer
}

button.edit{
background:#f59e0b;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer
}

/* TABELA MELHORADA */
.table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
display:block;
overflow-x:auto;
white-space:nowrap;
}

.table th{
text-align:left;
font-size:13px;
color:#9aa3b5;
padding:10px;
border-bottom:1px solid #1f2634
}

.table td{
padding:10px;
border-bottom:1px solid #141923
}

.page{display:none}
.page.active{display:block}

/* RESPONSIVO */
@media(max-width:768px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow-x:auto;
gap:6px;
padding:10px;
border-right:none;
border-bottom:1px solid #1c2230;
}

.menu{
flex-direction:row;
}

.menu button{
flex:1;
text-align:center;
font-size:12px;
padding:10px;
}

.topbar{
padding:0 15px;
font-size:14px;
}

.content{
padding:15px;
}

.grid{
grid-template-columns:1fr;
}

input,select{
font-size:14px;
}

}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="menu">

<button onclick="showPage('dashboard')">📊</button>
<button onclick="showPage('clientes')">👥</button>
<button onclick="showPage('produtos')">📦</button>
<button onclick="showPage('vendas')">💰</button>

</div>
</div>

<div class="main">

<div class="topbar">ASSENT Sistema v1.3.1</div>

<div class="content">

<div id="dashboard" class="page active">

<div class="grid">
<div class="card">Clientes<div class="stat" id="statClientes"></div></div>
<div class="card">Produtos<div class="stat" id="statProdutos"></div></div>
<div class="card">Vendas<div class="stat" id="statVendas"></div></div>
<div class="card">Faturamento<div class="stat" id="statFaturamento"></div></div>
</div>

</div>

<div id="clientes" class="page">
<h3>Novo Cliente</h3>

<div class="form">
<input id="clienteNome" placeholder="Nome">
<input id="clienteTelefone" placeholder="Telefone">
<input id="clienteInstagram" placeholder="Instagram">
</div>

<button class="primary" onclick="addCliente()">Salvar</button>

<table class="table" id="clientesTabela"></table>
</div>

<div id="produtos" class="page">
<h3>Novo Produto</h3>

<div class="form">
<input id="produtoNome" placeholder="Nome">
<input id="produtoPreco" placeholder="Preço">
<input id="produtoCusto" placeholder="Custo">
<input id="produtoEstoque" placeholder="Estoque">
</div>

<button class="primary" onclick="addProduto()">Salvar</button>

<table class="table" id="produtosTabela"></table>
</div>

<div id="vendas" class="page">

<h3>Registrar Venda</h3>

<div class="form">
<select id="vendaCliente"></select>
<select id="vendaProduto"></select>
<input id="vendaQtd" type="number" placeholder="Qtd">
<input id="vendaDesconto" type="number" placeholder="Desconto %" oninput="atualizarResumo()">
<input id="vendaData" type="date">
</div>

<button class="primary" onclick="addItemVenda()">Adicionar Item</button>

<br><br>

<table class="table" id="itensVendaTabela"></table>

<h3>Resumo da Venda</h3>
<div id="resumoVenda"></div>

<br>

<button class="primary" onclick="finalizarVenda()">Finalizar Venda</button>

<hr style="margin:40px 0">

<h3>Histórico de Vendas</h3>

<table class="table" id="vendasTabela"></table>

</div>

</div>
</div>
</div>

<script>

function load(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}}

let clientes=load("clientes")
let produtos=load("produtos")
let vendas=load("vendas")

let itensVenda=[]
let vendaEditando=null
let produtoEditando=null

function save(){
localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("produtos",JSON.stringify(produtos))
localStorage.setItem("vendas",JSON.stringify(vendas))

requestAnimationFrame(()=>render())
}

function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))
document.getElementById(p).classList.add("active")
}

function addCliente(){
let nome=clienteNome.value.trim()
if(!nome)return

clientes.push({
nome,
telefone:clienteTelefone.value,
insta:clienteInstagram.value
})

clienteNome.value=""
clienteTelefone.value=""
clienteInstagram.value=""

save()
}

function addProduto(){
let nome=produtoNome.value.trim()
if(!nome)return

if(produtos.some(p=>p.nome.toLowerCase()===nome.toLowerCase())){
alert("Já existe um produto com esse nome.")
return
}

produtos.push({
nome,
preco:Number(produtoPreco.value)||0,
custo:Number(produtoCusto.value)||0,
estoque:Number(produtoEstoque.value)||0
})

produtoNome.value=""
produtoPreco.value=""
produtoCusto.value=""
produtoEstoque.value=""

save()
}

function addItemVenda(){

let index=parseInt(vendaProduto.value)
let qtd=parseInt(vendaQtd.value)

if(isNaN(index)||!qtd)return

let p=produtos[index]

if(qtd>p.estoque){
alert("Estoque insuficiente.")
return
}

itensVenda.push({
produto:p.nome,
preco:p.preco,
qtd:qtd,
produtoIndex:index
})

vendaQtd.value=""

renderItensVenda()
atualizarResumo()
}

function removerItemVenda(i){
itensVenda.splice(i,1)
renderItensVenda()
atualizarResumo()
}

function renderItensVenda(){
itensVendaTabela.innerHTML=
'<tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Total</th><th></th></tr>'+
itensVenda.map((i,index)=>`
<tr>
<td>${i.produto}</td>
<td>${i.qtd}</td>
<td>${i.preco}</td>
<td>${(i.preco*i.qtd).toFixed(2)}</td>
<td><button class="danger" onclick="removerItemVenda(${index})">Remover</button></td>
</tr>
`).join("")
}

function atualizarResumo(){
let subtotal=itensVenda.reduce((t,i)=>t+(i.preco*i.qtd),0)
let desconto=Number(vendaDesconto.value)||0
let total=subtotal-(subtotal*(desconto/100))

resumoVenda.innerHTML=`
<p>Subtotal: <b>R$ ${subtotal.toFixed(2)}</b></p>
<p>Desconto: <b>${desconto}%</b></p>
<p>Total: <b>R$ ${total.toFixed(2)}</b></p>
`
}

function finalizarVenda(){

if(itensVenda.length===0)return

let subtotal=itensVenda.reduce((t,i)=>t+(i.preco*i.qtd),0)
let desconto=Number(vendaDesconto.value)||0
let total=subtotal-(subtotal*(desconto/100))

itensVenda.forEach(item=>{
produtos[item.produtoIndex].estoque -= item.qtd
})

vendas.push({
cliente:vendaCliente.value||"Não informado",
itens:[...itensVenda],
total,
data:vendaData.value||new Date().toISOString().split("T")[0]
})

itensVenda=[]
vendaDesconto.value=""
vendaData.value=""

renderItensVenda()
atualizarResumo()

save()
}

function render(){

statClientes.innerText=clientes.length
statProdutos.innerText=produtos.length
statVendas.innerText=vendas.length

let faturamento=vendas.reduce((t,v)=>t+(v.total||0),0)
statFaturamento.innerText="R$ "+faturamento.toFixed(2)

clientesTabela.innerHTML=
'<tr><th>Nome</th><th>Telefone</th><th>Instagram</th></tr>'+
clientes.map(c=>`
<tr>
<td>${c.nome}</td>
<td>${c.telefone}</td>
<td>${c.insta}</td>
</tr>
`).join("")

produtosTabela.innerHTML=
'<tr><th>Produto</th><th>Preço</th><th>Custo</th><th>Estoque</th></tr>'+
produtos.map(p=>`
<tr>
<td>${p.nome}</td>
<td>${p.preco}</td>
<td>${p.custo}</td>
<td>${p.estoque}</td>
</tr>
`).join("")

vendaProduto.innerHTML=produtos.map((p,i)=>`<option value="${i}">${p.nome}</option>`).join("")
vendaCliente.innerHTML='<option value="">Cliente</option>'+clientes.map(c=>`<option>${c.nome}</option>`).join("")

}

render()

</script>

</body>
</html>
